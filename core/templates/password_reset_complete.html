{% extends 'base.html' %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --void:    #0d0d0f;
  --charcoal:#1e1e23;
  --iron:    #2a2a31;
  --steel:   #3c3c47;
  --silver:  #a0a0b4;
  --mist:    #c8c8d8;
  --snow:    #eeeef4;
  --border:  rgba(255,255,255,0.06);
}

body { background: var(--void); }

.pc-root {
  min-height: 100vh;
  background: var(--void);
  background-image:
    radial-gradient(ellipse 70% 55% at 15% 10%, rgba(160,160,180,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 55% 70% at 85% 90%, rgba(100,100,130,0.05) 0%, transparent 55%);
  font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; justify-content: center;
  padding: 60px 24px;
  position: relative; overflow: hidden;
}

#particleCanvas {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
}

/* ══════════════════════════════
   CARD
══════════════════════════════ */
.pc-card {
  position: relative; z-index: 1;
  width: 100%; max-width: 520px;
  background: #f2f2f5;
  border-radius: 28px;
  padding: 52px 44px;
  text-align: center;
  box-shadow: 0 48px 96px rgba(0,0,0,0.60), 0 0 0 1px rgba(255,255,255,0.04);
  overflow: hidden;

  opacity: 0;
  transform: translateY(32px) scale(0.97);
  animation: cardEntrance 0.9s cubic-bezier(.22,.68,0,1.1) 0.15s forwards;
}

@keyframes cardEntrance {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* top accent line */
.pc-card::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, #3d9b6e, #74d4a2, #a8e8c8);
  border-radius: 28px 28px 0 0;
}

/* shimmer sweep */
.pc-card::after {
  content: "";
  position: absolute; top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.18) 50%, transparent 60%);
  animation: shimmerSweep 1.1s 0.85s forwards;
  pointer-events: none;
}
@keyframes shimmerSweep { to { left: 160%; } }

/* Success icon ring */
.pc-icon-wrap {
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
  width: 84px; height: 84px; border-radius: 50%;
  background: rgba(61,155,110,0.12);
  border: 2px solid rgba(61,155,110,0.22);
  position: relative;
  animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1) 0.8s both;
}

@keyframes popIn {
  from { transform: scale(0.5); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

/* Ripple ring */
.pc-icon-wrap::before {
  content: "";
  position: absolute; inset: -10px; border-radius: 50%;
  border: 1px solid rgba(61,155,110,0.15);
  animation: ripple 2s ease-out 1.2s infinite;
}
.pc-icon-wrap::after {
  content: "";
  position: absolute; inset: -20px; border-radius: 50%;
  border: 1px solid rgba(61,155,110,0.08);
  animation: ripple 2s ease-out 1.5s infinite;
}

@keyframes ripple {
  0%   { transform: scale(0.9); opacity: 1; }
  100% { transform: scale(1.3); opacity: 0; }
}

.pc-icon { font-size: 36px; line-height: 1; }

.pc-kicker {
  display: inline-block; padding: 5px 13px; border-radius: 999px;
  background: rgba(61,155,110,0.12);
  border: 1px solid rgba(61,155,110,0.20);
  color: #2e8a60;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase;
  margin-bottom: 14px;
}

.pc-title {
  font-family: 'Playfair Display', serif;
  font-size: 30px; font-weight: 900;
  color: #18181f; margin-bottom: 10px;
  line-height: 1.1;
}

.pc-text {
  font-size: 14px; color: #7a7a8e;
  line-height: 1.8; margin-bottom: 28px;
  max-width: 360px; margin-left: auto; margin-right: auto;
}

/* Divider */
.pc-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, #d4d4e0 30%, #d4d4e0 70%, transparent);
  margin: 0 auto 28px;
  max-width: 300px;
}

.btn-login {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 15px 36px; border-radius: 999px;
  background: linear-gradient(135deg, var(--charcoal), var(--steel));
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px; font-weight: 700;
  text-decoration: none;
  box-shadow: 0 14px 36px rgba(0,0,0,0.32), inset 0 0 0 1px rgba(255,255,255,0.08);
  transition: transform .2s, box-shadow .2s;
  position: relative; overflow: hidden;
}
.btn-login::before {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
}
.btn-login:hover { transform: translateY(-2px); box-shadow: 0 20px 48px rgba(0,0,0,0.44); }
.btn-login:active { transform: scale(0.97); }

.pc-note {
  margin-top: 22px;
  font-size: 12.5px; color: #9a9aae; line-height: 1.7;
}
</style>

<canvas id="particleCanvas"></canvas>

<div class="pc-root">
  <div class="pc-card">

    <div class="pc-icon-wrap">
      <span class="pc-icon">✓</span>
    </div>

    <div class="pc-kicker">Success</div>
    <h2 class="pc-title">Password Updated</h2>
    <p class="pc-text">
      Your password has been reset successfully. You can now log in with your new password.
    </p>

    <div class="pc-divider"></div>

    <a href="{% url 'login' %}" class="btn-login">
      Login Now →
    </a>

    <div class="pc-note">
      Keep your new password safe. Don't share it with anyone.
    </div>

  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('particleCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [];
  const COUNT = 30;

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function rand(a,b) { return a + Math.random()*(b-a); }

  function spawn() {
    return {
      x: rand(0,W), y: rand(-40,H+40),
      r: rand(1,3.5),
      vx: rand(-0.18,0.18), vy: rand(-0.45,-0.12),
      alpha: rand(0.06,0.28),
      pulse: rand(0,Math.PI*2), pv: rand(0.012,0.025)
    };
  }

  function init() {
    resize();
    particles = Array.from({length:COUNT}, spawn);
    particles.forEach(p => { p.y = rand(0,H); });
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.pulse += p.pv;
      const a = p.alpha * (0.65 + 0.35*Math.sin(p.pulse));
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(180,180,200,${a})`; ctx.fill();
      p.x += p.vx; p.y += p.vy;
      if (p.y < -20) { Object.assign(p,spawn()); p.y = H+10; }
      if (p.x < -10)  p.x = W+10;
      if (p.x > W+10) p.x = -10;
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  init(); draw();
})();
</script>

{% endblock %}
